<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/b2541f8c7c.js" crossorigin="anonymous"></script>
    <title>inicio</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="contenedor-principal">
        <header class="encabezado">
            <div class="logo-pos">
                <a href="#">
                    <i class="fa-solid fa-bag-shopping"></i><br>
                    PTO VENTA
                </a>
            </div>
            <div class="contenedor-enlaces">
                <a href="products.html" class="enlaces">
                    <i class="fa-solid fa-box-open"></i><br>
                    Productos
                </a>
                <a href="ventas.html" class="enlaces">
                    <i class="fa-solid fa-dolly"></i><br>
                    Ventas
                </a>
                <a href="#" class="enlaces">
                    <i class="fa-solid fa-user-plus"></i><br>
                    Clientes
                </a>
                <a href="#" class="enlaces">
                    <i class="fa-regular fa-file"></i><br>
                    Reportes
                </a>
                <a href="#" class="enlaces">
                    <i class="fa-solid fa-user-gear"></i><br>
                    Configuración
                </a>
            </div>

        </header>
        
        <section class="principal">
            <div class="principal-izquierda">
                <div class="principal-izquierda-texto">
                    <h2>Bienvenido al Punto de Venta</h2>
                    <h4>Tu aliado para gestionar tu negocio</h4>
                    <p>Puedes hacer clic en un módulo para empezar o navegar por tu punto de venta.</p>
                </div>
                <div class="principal-izquierda-botones">
                    <input type="button" class="principal-boton" value="Nueva venta +">
                    <input type="button" class="principal-boton" value="Agregar producto +">
                    <input type="button" class="principal-boton" value="Agregar cliente +">
                </div>
            </div>
            <div class="principal-derecha">
                <div class="principal-derecha notificaciones">
                    <a href="#"><i class="fa-solid fa-bell"></i></a>
                </div>
                <div class="principal-derecha">
                    <a href="#">
                        <button class="ayuda boton">¿Necesitas ayuda?</button>
                    </a>
                </div>
                <div class="principal-derecha">
                    <a href="ingresar.html">
                        <button class="cerrar boton">Cerrar sesión</button>
                    </a>
                </div>
            </div>
        </section>

        <footer class="pie pagina">
            <div class="contenedor-logo-empresa enlaces-pie">
                <img src="img/tech_sol_logo.png" alt="logo_emp" class="logo-empresa">
                <a href="#" class="enlace-empresa">¿Quienes somos?</a>
            </div>
            <div class="contenedor-email enlaces-pie">
                <a href="mailto:contacto@techsolutions.com">Contáctanos  <i><i class="fa-regular fa-envelope"></i></i></a>
            </div>
            <div class="contenedor-redes-sociales enlaces-pie">
                <a target="_blank" href="https://www.facebook.com/"><i class="fa-brands fa-facebook"></i></a>
                <a target="_blank" href="https://x.com/"><i class="fa-brands fa-twitter"></i></a>
                <a target="_blank" href="https://web.whatsapp.com/"><i class="fa-brands fa-whatsapp"></i></a>
                <a target="_blank" href="https://www.instagram.com/"><i class="fa-brands fa-square-instagram"></i></a>
            </div>
        </footer>
    </main>
</body>
</html>
