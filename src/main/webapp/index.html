<!DOCTYPE html>
<html>
<head><title>Easy POS - Add Product</title></head>
<body>
    <h2>Add New Product</h2>
    <form id="productForm">
    <input type="text" id="sku" placeholder="SKU Code" required><br>
    <input type="text" id="nombre" placeholder="Product Name" required><br>
    <textarea id="desc" placeholder="Description"></textarea><br>
    
    <input type="number" step="0.01" id="precioVenta" placeholder="Selling Price" required><br>
    
    <input type="number" step="0.01" id="precioCosto" placeholder="Cost Price" required><br>
    
    <input type="number" id="stockActual" placeholder="Initial Stock" required><br>
    
    <input type="number" id="stockMin" placeholder="Minimum Stock Level" required><br>
    
    <input type="number" id="catId" placeholder="Category ID (1, 2, etc)" required><br>
    
    <button type="submit">Add Product</button>
</form>

    <script>
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const productData = {
            CODIGO_SKU: document.getElementById('sku').value,
            NOMBRE_PRODUCTO: document.getElementById('nombre').value,
            DESCRIPCION_PRODUCTO: document.getElementById('desc').value,
            PRECIO_VENTA: parseFloat(document.getElementById('precioVenta').value),
            PRECIO_COSTO: parseFloat(document.getElementById('precioCosto').value),
            STOCK_ACTUAL: parseInt(document.getElementById('stockActual').value),
            STOCK_MIN: parseInt(document.getElementById('stockMin').value),
            CATEGORIA_ID: parseInt(document.getElementById('catId').value)
        };

        try {
            const response = await fetch('addProduct', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            });
            const result = await response.json();
            alert(result.message);
        } catch (error) {
            console.error("Error:", error);
            alert("Check the console for errors!");
        }
    });
    </script>
</body>
</html>
