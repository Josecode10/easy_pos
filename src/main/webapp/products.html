<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy POS - Add Product</title>
    <script src="js/productManager.js" defer></script>
    <link rel="stylesheet" href="css/productos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
        	<a href="index.html" class="volver-inicio">← Regresar</a>
        	<br>
        	<br>
            <h2>Add New Product</h2>
            <form id="productForm">
                <div class="form-grid">
                    <input type="text" id="sku" placeholder="SKU Code" required>
                    <input type="text" id="nombre" placeholder="Product Name" required>
                    <textarea id="desc" placeholder="Description" class="full-width"></textarea>
                    
                    <input type="number" step="0.01" id="precioVenta" placeholder="Selling Price" required>
                    <input type="number" step="0.01" id="precioCosto" placeholder="Cost Price" required>
                    <input type="number" id="stockActual" placeholder="Initial Stock" required>
                    <input type="number" id="stockMin" placeholder="Min Stock Level" required>
                </div>
                
                <div class="category-section">
                    <label for="catId">Category:</label>
                    <select id="catId" required>
                        <option value="">Select a category</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-primary">Add Product</button>
            </form>
        </div>

        <div class="card table-card">
            <button type="button" id="loadProducts" class="btn-secondary">Display All Products</button>
            
            <div id="productContainer">
                <table id="productTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
