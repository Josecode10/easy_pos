<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy POS - Add Product</title>
    <script src="js/productManager.js" defer></script>
</head>
<body>
    <h2>Add New Product</h2>
    <form id="productForm">
        <input type="text" id="sku" placeholder="SKU Code" required><br>
        <input type="text" id="nombre" placeholder="Product Name" required><br>
        <textarea id="desc" placeholder="Description"></textarea><br>
        
        <input type="number" step="0.01" id="precioVenta" placeholder="Selling Price" required><br>
        <input type="number" step="0.01" id="precioCosto" placeholder="Cost Price" required><br>
        <input type="number" id="stockActual" placeholder="Initial Stock" required><br>
        <input type="number" id="stockMin" placeholder="Minimum Stock Level" required><br>
        
        <label>Category:</label><br>
        <select id="catId" required>
            <option value="">Select a category</option>
        </select><br>
        <br>
        <button type="submit">Add Product</button>
    </form>
	
    <hr>
    <button type="button" id="loadProducts">Display All Products</button>
	
    <div id="productContainer" style="margin-top: 20px;">
        <table border="1" id="productTable" style="display:none; width:100%; text-align:left;">
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
        </table>
    </div>
</body>
</html>
